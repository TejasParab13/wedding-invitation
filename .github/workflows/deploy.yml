name: Deploy Wedding Sites

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build web app
        run: flutter build web

      # ----- Prepare Chetan's folder -----
      - name: Create Chetans folder
        run: mkdir -p Chetans

      - name: Copy build to Chetans
        run: cp -r build/web/* Chetans/

      - name: Copy Chetan's preview image
        run: cp link_preview_C.jpg Chetans/ || true

      - name: Customize Chetans/index.html
        run: |
          echo "=== Before base href replacement ==="
          grep '<base' Chetans/index.html || echo "No base tag found"
          # Replace base href
          sed -i 's|<base href="[^"]*"|<base href="/wedding-invitation/Chetans/"|' Chetans/index.html
          echo "=== After base href replacement ==="
          grep '<base' Chetans/index.html

          # Title
          sed -i 's|<title>.*</title>|<title>Wedding Invitation</title>|' Chetans/index.html

          # Meta description
          sed -i 's|<meta name="description" content="[^"]*"|<meta name="description" content="You are invited to the wedding ceremony of Chetan & Ravina."|' Chetans/index.html

          # Insert Open Graph tags after <head>
          sed -i '/<head>/a\
          <meta property="og:title" content="Wedding Invitation" />\
          <meta property="og:description" content="You are invited to the wedding ceremony of Chetan & Ravina." />\
          <meta property="og:image" content="https://tejasparab13.github.io/wedding-invitation/Chetans/link_preview_C.jpg" />\
          <meta property="og:url" content="https://tejasparab13.github.io/wedding-invitation/Chetans/" />\
          <meta property="og:type" content="website" />\
          <meta property="og:site_name" content="Wedding Invitation" />\
          <meta name="twitter:card" content="summary_large_image" />' Chetans/index.html

          echo "=== Final index.html preview (first 20 lines) ==="
          head -20 Chetans/index.html

      # ----- Prepare Ravina's folder -----
      - name: Create Ravinas folder
        run: mkdir -p Ravinas

      - name: Copy build to Ravinas
        run: cp -r build/web/* Ravinas/

      - name: Copy Ravina's preview image
        run: cp link_preview_R.jpg Ravinas/ || true

      - name: Customize Ravinas/index.html
        run: |
          echo "=== Before base href replacement ==="
          grep '<base' Ravinas/index.html || echo "No base tag found"
          sed -i 's|<base href="[^"]*"|<base href="/wedding-invitation/Ravinas/"|' Ravinas/index.html
          echo "=== After base href replacement ==="
          grep '<base' Ravinas/index.html

          sed -i 's|<title>.*</title>|<title>Wedding Invitation</title>|' Ravinas/index.html
          sed -i 's|<meta name="description" content="[^"]*"|<meta name="description" content="You are invited to the wedding ceremony of Ravina & Chetan."|' Ravinas/index.html

          # Insert Open Graph tags after <head>
          sed -i '/<head>/a\
          <meta property="og:title" content="Wedding Invitation" />\
          <meta property="og:description" content="You are invited to the wedding ceremony of Ravina & Chetan." />\
          <meta property="og:image" content="https://tejasparab13.github.io/wedding-invitation/Ravinas/link_preview_R.jpg" />\
          <meta property="og:url" content="https://tejasparab13.github.io/wedding-invitation/Ravinas/" />\
          <meta property="og:type" content="website" />\
          <meta property="og:site_name" content="Wedding Invitation" />\
          <meta name="twitter:card" content="summary_large_image" />' Ravinas/index.html

          echo "=== Final index.html preview (first 20 lines) ==="
          head -20 Ravinas/index.html

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add Chetans Ravinas
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy updated wedding sites"
          git push